name: CI

on:
  push:
  pull_request:

jobs:
  flutter:
    name: Flutter analyze and test
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  db2-backend:
    name: DB2 backend compile checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check Go formatting
        working-directory: backend/db2
        run: test -z "$(gofmt -l .)"

      - name: Test Go backend without IBM client
        working-directory: backend/db2
        run: go test ./...
