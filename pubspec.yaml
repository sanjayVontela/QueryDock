name: db_viewer
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  panes: ^1.3.0
  rope: ^0.0.5
  flutter_code_editor: ^0.3.5
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  bitsdojo_window: ^0.1.5
  postgres: ^3.5.11
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.5
  pluto_grid: ^8.1.0
  file_selector: ^1.1.0
  csv: ^6.0.0
  sqlite3: ^3.3.2
  mysql_client_plus: ^0.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/branding/querydock_logo.png
    - assets/branding/querydock_app_icon.png

